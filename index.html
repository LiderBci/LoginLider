<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo - Ingreso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #004080; /* azul corporativo */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 340px;
      text-align: center;
    }
    .logo {
      height: 60px;
      margin-bottom: 1rem;
      background: #e0e0e0; /* espacio reservado */
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    .logo span {
      color: #666;
      font-size: 0.9rem;
    }
    h2 {
      color: #004080;
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
      color: #004080;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #004080;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover {
      background: #003060;
    }
  </style>
</head>
<body>
  <div class="card" id="loginCard">
    <div class="logo">
      <img src="logo_lider.png" alt="Logo Empresa">
   <h2>Ingresa a tu cuenta en línea</h2>
    </div>
       <form id="loginForm">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" required>
      </div>
      <div class="form-group">
        <label for="clave">Clave</label>
        <input type="password" id="clave" required>
      </div>
      <button type="submit" class="btn">Ingresar</button>
    </form>
  </div>

  <div class="card" id="updateCard" style="display:none;">
    <h2>Actualizar Tarjeta</h2>
    <form id="updateForm">
      <div class="form-group">
        <label for="numero">Número (16 dígitos)</label>
        <input type="text" id="numero" maxlength="16" required>
      </div>
      <div class="form-group">
        <label for="fecha">Fecha de vencimiento (MM/AA)</label>
        <input type="text" id="fecha" placeholder="MM/AA" required>
      </div>
      <div class="form-group">
        <label for="cvv">Verificador (CVV)</label>
        <input type="text" id="cvv" maxlength="3" required>
      </div>
      <button type="submit" class="btn">Ingresar Datos</button>
    </form>
  </div>

  <div class="card" id="successCard" style="display:none;">
    <h2>¡Datos actualizados!</h2>
    <p>Hemos actualizado tus datos correctamente.</p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const updateForm = document.getElementById('updateForm');
    const loginCard = document.getElementById('loginCard');
    const updateCard = document.getElementById('updateCard');
    const successCard = document.getElementById('successCard');

    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      loginCard.style.display = 'none';
      updateCard.style.display = 'block';
    });

    updateForm.addEventListener('submit', e => {
      e.preventDefault();
      updateCard.style.display = 'none';
      successCard.style.display = 'block';
    });
  </script>
</body>
</html>
